name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    branches: [master]
permissions:
  checks: write
  contents: read
  pull-requests: write
  issues: write
  id-token: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_CLAUDE_CODE_12345 }}"
          projectId: claude-firebase-deploy

  claude_review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            Review the changes in this PR against our CLAUDE.md standards.
            Check for security vulnerabilities, missing tests, architecture
            violations, performance issues, and documentation gaps. In
            particular, this project is MUI-only: components/pages must use
            MUI components (Box, Typography, etc.) and the `sx` prop or
            `styled()`, never raw HTML elements or inline `style={{}}`
            attributes — flag any violation of that.
            You MUST post your findings as inline comments on the relevant
            lines using the inline comment tool, and post a short summary
            comment at the end. Do not just analyze — actually post the
            comments. If nothing actionable is found, post a summary comment
            that says so.
          claude_args: >-
            --max-turns 40
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
